version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Intelligent Data Analysis Agent — Microservices Stack
#
# Services:
#   ollama  — local LLM inference (no API key required)
#   api     — FastAPI analysis engine
#   ui      — Streamlit dashboard
#
# Usage:
#   docker compose up --build
#   Then open http://localhost:8501
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama LLM service ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: data_agent_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Pull default model on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull ${DEFAULT_MODEL:-qwen2.5:3b} &&
             wait"

  # ── FastAPI analysis service ────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: data_agent_api
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen2.5:3b}
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ../outputs:/app/outputs    # persist reports, plots, sessions
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Streamlit UI service ────────────────────────────────────────────────────
  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    container_name: data_agent_ui
    environment:
      - API_URL=http://api:8000
    volumes:
      - ../outputs:/app/outputs    # read plots for display
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
